<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Day 12 — 포모도로 타이머</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>🍅 포모도로 타이머</h1>
  <div class="timer-wrap">
    <svg viewBox="0 0 200 200">
      <circle cx="100" cy="100" r="90" fill="none" stroke="#f0f0f0" stroke-width="10"/>
      <circle id="progress" cx="100" cy="100" r="90" fill="none" stroke="#e74c3c" stroke-width="10"
        stroke-dasharray="565.49" stroke-dashoffset="0" stroke-linecap="round"
        transform="rotate(-90 100 100)" style="transition:stroke-dashoffset 0.5s"/>
    </svg>
    <div id="time">
      <span id="timeText">25:00</span>
      <span id="modeText">집중 시간</span>
    </div>
  </div>
  <div class="btns">
    <button id="startBtn">▶ 시작</button>
    <button id="resetBtn">↺ 초기화</button>
    <button id="skipBtn">⏭ 건너뛰기</button>
  </div>
  <div class="cycles" id="cycles"></div>
  <div class="settings">
    <div class="setting"><label>집중(분)</label><input type="number" id="workMin" value="25" min="1"></div>
    <div class="setting"><label>휴식(분)</label><input type="number" id="breakMin" value="5" min="1"></div>
  </div>
  <script src="main.js"></script>
</body>
</html>
